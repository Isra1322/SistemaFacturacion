<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Productos</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="header">
    <h1>Gestión de Productos</h1>
  </header>

<nav class="top-nav">
  <div class="top-nav-container">
    <a href="../index.html" class="nav-link">Inicio</a>
    <a href="./clientes.html" class="nav-link">Clientes</a>
    <a href="./productos.html" class="nav-link">Productos</a>
    <a href="./factura.html" class="nav-link">Nueva Factura</a>
    <a href="./facturas.html" class="nav-link">Consultar Facturas</a>
  </div>
</nav>

  <main class="container">
    <section class="page-header">
      <div>
        <h2>Administración de Productos</h2>
        <p>Registra y controla los productos disponibles para facturación.</p>
      </div>
      <span class="badge">Módulo activo</span>
    </section>

    <section class="form-section">
      <h2>Registrar Producto</h2>
      <form id="productoForm" novalidate>
        <input type="text" id="nombre" placeholder="Nombre del producto" required>
        <input type="number" id="precio" placeholder="Precio" step="0.01" required>
        <input type="number" id="stock" placeholder="Stock" min="0" required>
        <button type="submit">Guardar Producto</button>
      </form>
    </section>

    <section class="list-section">
      <div class="page-header">
        <div>
          <h2>Listado de Productos</h2>
          <p>Búsqueda rápida con paginación.</p>
        </div>
      </div>

      <input type="text" id="buscarProducto" placeholder="Buscar producto por nombre">

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Stock</th>
            </tr>
          </thead>
          <tbody id="productosBody"></tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="btnAnterior">Anterior</button>
        <span id="paginaActual">Página 1</span>
        <button id="btnSiguiente">Siguiente</button>
      </div>
    </section>
  </main>

  <div id="toast-container"></div>
  <script src="../js/toast.js"></script>
  <script src="../js/productos.js"></script>
  <script src="../js/nav.js"></script>
</body>
</html>
